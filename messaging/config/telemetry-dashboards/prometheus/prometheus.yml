global:
  scrape_interval: 15s
  external_labels:
    monitor: krakend_monitor

scrape_configs:
  - job_name: krakend_scrapper
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets:
        - 'krakend_ee:9090'
        labels:
          app: krakend
      - targets:
        - '192.168.1.22:9099'
        labels:
          app: lokrakend
