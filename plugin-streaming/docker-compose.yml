services:
  krakend_ee:
    build:
      context: .
    ports:
      - "8080:8080"
    volumes:
      - ./config/krakend/LICENSE:/etc/krakend/LICENSE
      - ./config/krakend/krakend.json:/etc/krakend/krakend.json
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8090:8090"